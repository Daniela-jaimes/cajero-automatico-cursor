<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATM — Cajero Automático</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <!-- Login -->
    <section id="login-view" class="view active" aria-label="Inicio de sesión">
      <div class="card">
        <div class="card-header">
          <span class="logo" aria-hidden="true">🏦</span>
          <h1>ATM Bank</h1>
          <p class="subtitle">Ingresa a tu cuenta</p>
        </div>

        <form id="login-form" novalidate>
          <div class="field">
            <label for="login-username">Usuario</label>
            <input
              type="text"
              id="login-username"
              name="username"
              placeholder="Ej: ana"
              autocomplete="username"
              required
            >
          </div>
          <div class="field">
            <label for="login-password">Contraseña</label>
            <input
              type="password"
              id="login-password"
              name="password"
              placeholder="Tu contraseña"
              autocomplete="current-password"
              required
            >
          </div>
          <p id="login-message" class="message" role="alert" hidden></p>
          <button type="submit" class="btn btn-primary">Ingresar</button>
        </form>
      </div>
    </section>

    <!-- Dashboard -->
    <section id="dashboard-view" class="view" aria-label="Panel principal" hidden>
      <div class="card">
        <div class="card-header">
          <span class="logo" aria-hidden="true">🏦</span>
          <h1 id="welcome-text">Hola, usuario</h1>
          <p class="subtitle">Tu saldo disponible</p>
        </div>

        <div class="balance-panel">
          <p class="balance-label">Saldo actual</p>
          <p id="balance-display" class="balance-amount">$0.00</p>
        </div>

        <div class="actions">
          <button type="button" id="btn-transfer" class="btn btn-primary">Transferir</button>
          <button type="button" id="btn-logout" class="btn btn-secondary">Cerrar sesión</button>
          <button type="button" id="btn-reset-demo" class="btn btn-ghost">Restaurar datos de demo</button>
        </div>
      </div>
    </section>
  </main>

  <!-- Modal Transferencia -->
  <div id="transfer-modal" class="modal" hidden aria-hidden="true">
    <div class="modal-backdrop" data-close-modal></div>
    <div class="modal-content card" role="dialog" aria-labelledby="transfer-title" aria-modal="true">
      <h2 id="transfer-title">Transferir dinero</h2>
      <p class="subtitle">Envía fondos a otra cuenta</p>

      <form id="transfer-form" novalidate>
        <div class="field">
          <label for="transfer-destination">Cuenta destino</label>
          <input
            type="text"
            id="transfer-destination"
            name="destination"
            placeholder="Ej: juan"
            required
          >
        </div>
        <div class="field">
          <label for="transfer-amount">Monto</label>
          <input
            type="number"
            id="transfer-amount"
            name="amount"
            placeholder="0.00"
            min="0.01"
            step="0.01"
            required
          >
        </div>
        <p id="transfer-message" class="message" role="alert" hidden></p>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" data-close-modal>Cancelar</button>
          <button type="submit" class="btn btn-primary">Confirmar transferencia</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
